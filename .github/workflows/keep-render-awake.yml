name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error "https://inventory-management-system-akoi.onrender.com/" > /dev/null
          echo "Backend ping successful"
